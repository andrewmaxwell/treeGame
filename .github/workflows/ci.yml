name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Tests
        run: npx vitest run

      - name: Lint
        run: npx eslint src --max-warnings 0

      - name: Prettier
        run: npx prettier --check "src/**/*.{ts,tsx}"
